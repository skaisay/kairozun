<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Kairozun Overlay</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>

  <!-- ═══ Fullscreen Game Filter (colored overlay — zero GPU cost) ═══ -->
  <div id="game-filter"></div>

  <!-- ═══ TOP-LEFT: FPS & Ping ═══ -->
  <div id="panel-tl" class="glass-panel top-left">
    <div class="panel-row" id="fps-row">
      <span class="label" data-i18n="fps">FPS</span>
      <span class="value" id="fps-value">--</span><span class="value hidden" id="fps-srv-part"></span>
    </div>
    <div class="panel-row" id="ping-row">
      <span class="label" data-i18n="ping">PING</span>
      <span class="value" id="ping-value">--</span>
    </div>
    <div class="panel-row" id="temp-row">
      <span class="label">TEMP</span>
      <span class="value" id="temp-value">--</span>
    </div>
  </div>

  <!-- ═══ TOP-RIGHT: Account / Game Info ═══ -->
  <div id="panel-tr" class="glass-panel top-right">
    <div class="panel-header">
      <img class="avatar-img hidden" id="avatar-img" width="22" height="22" alt="">
      <span class="avatar" id="avatar-letter">K</span>
      <span class="username" id="username">Kairozun</span>
      <span class="status-dot" id="roblox-status" title="Roblox"></span>
    </div>
    <div class="panel-row" id="friends-row">
      <span class="label" data-i18n="friends">FR</span>
      <span class="value" id="friends-value">--</span>
    </div>
    <div class="panel-row hidden" id="followers-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></span>
      <span class="value" id="followers-value">--</span>
    </div>
    <div class="panel-row hidden" id="account-age-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
      <span class="value genre-text" id="account-age-value">--</span>
    </div>
    <div class="panel-row hidden" id="game-row">
      <img class="game-icon hidden" id="game-icon" width="18" height="18" alt="">
      <span class="value game-name" id="game-name" title="">--</span>
    </div>
    <div class="panel-row hidden" id="creator-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="value genre-text" id="creator-value">--</span>
    </div>
    <div class="panel-row hidden" id="genre-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
      <span class="value genre-text" id="genre-value">--</span>
    </div>
    <div class="panel-row hidden" id="players-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      <span class="value" id="players-value">--</span>
    </div>
    <div class="panel-row hidden" id="online-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="10"/></svg></span>
      <span class="value genre-text" id="online-value">--</span>
    </div>
    <div class="panel-row hidden" id="server-fps-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
      <span class="value genre-text" id="server-fps-value">--</span>
    </div>
    <div class="panel-row hidden" id="server-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
      <span class="value server-ip" id="server-ip">--</span>
    </div>
    <div class="panel-row hidden" id="region-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
      <span class="value region-text" id="region-value">--</span>
    </div>
    <div class="panel-row hidden" id="uptime-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
      <span class="value" id="uptime-value">--</span>
    </div>
    <div class="panel-row hidden" id="visits-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
      <span class="value" id="visits-value">--</span>
    </div>
    <div class="panel-row hidden" id="favs-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
      <span class="value" id="favs-value">--</span>
    </div>
    <div class="panel-row hidden" id="rating-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></span>
      <span class="value" id="rating-value">--</span>
    </div>
    <div class="panel-row hidden" id="servers-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></span>
      <span class="value" id="servers-value">--</span>
    </div>
    <div class="kill-feed" id="kill-feed"></div>
  </div>

  <!-- ═══ MIDDLE-LEFT: Server Players ═══ -->
  <div id="panel-ml" class="glass-panel middle-left panel-hidden">
    <div class="player-list-header">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="player-list-title" data-i18n="players">Players</span>
      <span class="player-list-count" id="player-list-count">0</span>
    </div>
    <div class="player-avatar-grid" id="player-avatar-grid"></div>
  </div>

  <!-- ═══ MIDDLE-RIGHT: Friends List ═══ -->
  <div id="panel-mr" class="glass-panel middle-right panel-hidden">
    <div class="friends-list-header">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      <span class="friends-list-title" data-i18n="friendsList">Friends</span>
      <span class="friends-list-online" id="friends-online-count">0</span>
      <button class="friends-collapse-btn" id="friends-collapse-btn" title="Collapse">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="friends-list-body" id="friends-list-body"></div>
  </div>

  <!-- ═══ BOTTOM-LEFT: System Load ═══ -->
  <div id="panel-bl" class="glass-panel bottom-left">
    <div class="panel-row">
      <span class="label">CPU</span>
      <div class="bar-wrap"><div class="bar" id="cpu-bar" style="width:0%"></div></div>
      <span class="value" id="cpu-value">0%</span>
    </div>
    <div class="panel-row">
      <span class="label">RAM</span>
      <div class="bar-wrap"><div class="bar bar-mem" id="mem-bar" style="width:0%"></div></div>
      <span class="value" id="mem-value">0%</span>
    </div>
  </div>

  <!-- ═══ BOTTOM-RIGHT: Clock ═══ -->
  <div id="panel-br" class="glass-panel bottom-right">
    <div class="panel-row clock-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
      <span class="value clock-value" id="clock-value">00:00</span>
    </div>
    <div class="panel-row">
      <span class="label icon-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
      <span class="value session-value" id="session-value">0:00</span>
    </div>
  </div>

  <!-- ═══ BOTTOM-CENTER: Hint ═══ -->
  <div id="panel-bc" class="glass-panel bottom-center">
    <span class="hint" data-i18n="hint">Alt+0 — Settings</span>
  </div>

  <!-- ═══ Recording indicator ═══ -->
  <div id="rec-indicator" class="hidden">
    <span class="rec-dot"></span>
    <span class="rec-label">REC</span>
    <span class="rec-timer" id="rec-timer">0:00</span>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
